name: Dart Lint CI

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened, edited, ready_for_review]

  # Also run on push to main branches (optional)
  push:
    branches: [main, master, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # Fetch all history for all branches
        fetch-depth: 0

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.5'
        channel: 'stable'
        cache: true
        cache-key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
        cache-path: ${{ runner.temp }}/flutter_cache

    - name: Install Dependencies
      run: flutter pub get

    - name: Check Formatting
      run: |
        echo "🔍 Checking Dart formatting..."
        dart format --set-exit-if-changed --output=none .

    - name: Analyze Code
      run: |
        echo "🔍 Running Dart analysis..."
        flutter analyze

    - name: Verify Analysis Options
      run: |
        echo "📋 Checking analysis configuration..."
        if [ -f "analysis_options.yaml" ]; then
          echo "✅ analysis_options.yaml exists"
        else
          echo "⚠️  analysis_options.yaml not found"
        fi

    - name: Check for Large Files
      run: |
        echo "📏 Checking for large Dart files..."
        find lib -name "*.dart" -size +100k 2>/dev/null | while read file; do
          lines=$(wc -l < "$file")
          echo "⚠️  Large file: $file ($lines lines)"
        done || true