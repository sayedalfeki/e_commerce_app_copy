name: Dart Lint & Analysis CI

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened, edited, ready_for_review]

  push:
    branches: [main, master, develop]

jobs:
  lint-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.5'
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    - name: Run Dart Linting & Analysis
      run: |
        echo "========================================"
        echo "🚀 RUNNING DART LINTING CHECKS"
        echo "========================================"
        echo ""
        echo "This command performs static analysis including:"
        echo "✅ Code style checks"
        echo "✅ Potential bug detection"
        echo "✅ Unused code analysis"
        echo "✅ Type safety checks"
        echo "✅ Best practices validation"
        echo ""
        echo "Running: flutter analyze"
        echo ""
        
        # THIS IS THE LINTING COMMAND
        flutter analyze
        
        echo ""
        echo "========================================"
        echo "✅ DART LINTING COMPLETED"
        echo "========================================"