name: Firebase Distribution

on:
  pull_request:
    types: [labeled]
    

jobs:
  distribute:
    if: github.event.label.name == 'ReadyForTesting'
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: |
          flutter clean
          flutter build apk --release
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Upload to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app ${{ secrets.ANDROID_APP_ID }} \
            --groups "testers" \
            --release-notes "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
      
      - name: Comment on PR
        if: success()
        run: |
          echo "✅ Build uploaded to Firebase App Distribution!" >> comment.txt
          echo "" >> comment.txt
          echo "Testers have been notified." >> comment.txt
        # Note: For commenting, you'd need to use GitHub API or another action
