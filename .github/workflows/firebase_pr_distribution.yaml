name: Firebase App Distribution

on:
  pull_request:
    types: [ labeled ]

jobs:
  build-and-distribute:
    # Only run when the label "ReadyForTesting" is added
    if: github.event.label.name == 'ReadyForTesting'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java for Android (if needed)
        if: runner.os == 'Linux'
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: runner.os == 'Linux'
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        if: runner.os == 'Linux'
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK/AAB
        if: runner.os == 'Linux'
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
        # Or for debug builds: ./gradlew assembleDebug
        # Customize based on your project structure

      - name: Build iOS (if applicable)
        if: runner.os == 'macOS-latest'
        run: |
          xcodebuild -workspace YourApp.xcworkspace -scheme YourApp -configuration Release -archivePath ./build/YourApp.xcarchive archive
          xcodebuild -exportArchive -archivePath ./build/YourApp.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath ./build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          # For iOS: IOS_APP_ID: ${{ secrets.IOS_APP_ID }}
          # For Android: ANDROID_APP_ID: ${{ secrets.ANDROID_APP_ID }}
        run: |
          # Android example
          firebase appdistribution:distribute app/build/outputs/apk/release/app-release.apk \
            --app ${{ secrets.ANDROID_APP_ID }} \
            --groups "testers,qa-team" \
            --release-notes-file release_notes.txt
          
          # iOS example (uncomment if needed)
          # firebase appdistribution:distribute build/YourApp.ipa \
          #   --app ${{ secrets.IOS_APP_ID }} \
          #   --groups "testers,qa-team" \
          #   --release-notes-file release_notes.txt



      - name: Comment on PR
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build successfully uploaded to Firebase App Distribution! Testers have been notified.'
            })