name: Firebase App Distribution

on:
  pull_request:
    types: [labeled]

jobs:
  distribute:
    if: github.event.label.name == 'ReadyForTesting'
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java (needed for Android build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3️⃣ Setup Flutter (Latest stable with Dart 3.10+)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.5'

      # 4️⃣ Install packages
      - name: Install dependencies
        run: flutter pub get

      # 5️⃣ Generate code (Injectable, Freezed, JsonSerializable, Retrofit, etc)
      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # 6️⃣ Build Release APK
      - name: Build APK
        run: flutter build apk --release

      # 7️⃣ Upload to Firebase App Distribution
      - name: Upload to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            PR #${{ github.event.pull_request.number }}
            ${{ github.event.pull_request.title }}
