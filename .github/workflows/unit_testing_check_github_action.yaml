name: Unit Testing Check
on:
  pull_request:
    - opened
    - synchronize
    - edited
jobs:
  unit-testing-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test