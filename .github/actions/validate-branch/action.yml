name: 'Flutter Branch Name Validator'
description: 'Validate branch names against Flutter project conventions'
author: 'Flutter Team'

inputs:
  branch-name:
    description: 'Branch name to validate (if empty, will auto-detect)'
    required: false
  allowed-prefixes:
    description: 'Custom allowed prefixes (comma-separated)'
    required: false
    default: 'feature,feat,fix,bugfix,hotfix,release,refactor,docs,chore,test'
  max-length:
    description: 'Maximum branch name length'
    required: false
    default: '100'
  require-issue-number:
    description: 'Require issue number in branch name'
    required: false
    default: 'false'

outputs:
  is-valid:
    description: 'Whether the branch name is valid'
    value: ${{ steps.validate.outputs.is-valid }}
  branch-prefix:
    description: 'Extracted branch prefix'
    value: ${{ steps.extract-prefix.outputs.prefix }}
  branch-description:
    description: 'Extracted branch description'
    value: ${{ steps.extract-description.outputs.description }}

runs:
  using: "composite"
  steps:
    - name: Extract current branch name
      id: get-branch
      shell: bash
      run: |
        if [ -n "${{ inputs.branch-name }}" ]; then
          BRANCH_NAME="${{ inputs.branch-name }}"
        elif [ -n "${{ github.head_ref }}" ]; then
          BRANCH_NAME="${{ github.head_ref }}"
        else
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        fi
        echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

    - name: Extract branch prefix
      id: extract-prefix
      shell: bash
      run: |
        BRANCH_NAME="${{ steps.get-branch.outputs.branch_name }}"
        PREFIX=$(echo "$BRANCH_NAME" | cut -d'/' -f1)
        echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

    - name: Extract branch description
      id: extract-description
      shell: bash
      run: |
        BRANCH_NAME="${{ steps.get-branch.outputs.branch_name }}"
        DESCRIPTION=$(echo "$BRANCH_NAME" | cut -d'/' -f2-)
        echo "description=${DESCRIPTION}" >> $GITHUB_OUTPUT

    - name: Validate branch name
      id: validate
      shell: bash
      run: |
        BRANCH_NAME="${{ steps.get-branch.outputs.branch_name }}"
        ALLOWED_PREFIXES="${{ inputs.allowed-prefixes }}"
        MAX_LENGTH="${{ inputs.max-length }}"
        REQUIRE_ISSUE_NUMBER="${{ inputs.require-issue-number }}"
        .github/workflows/validate_branch_name.sh